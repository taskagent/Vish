<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work From Home</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
}

.header {
    background: #3b1e8c;
    color: white;
    padding: 20px;
}

.container {
    padding: 20px;
}

.highlight {
    color: #ff2f6d;
    font-weight: bold;
    font-size: 20px;
    margin: 15px 0;
}

.whatsapp-btn, .contact-btn {
    display: inline-block;
    margin: 10px;
    background: linear-gradient(45deg, #ff4b5c, #ff2f9a);
    color: white;
    padding: 15px 25px;
    border-radius: 30px;
    font-size: 18px;
    text-decoration: none;
}

.contact-btn {
    display: block;
    width: 80%;
    margin: 20px auto;
    background: #3b1e8c;
}

.image-box img {
    width: 90%;
    border-radius: 15px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">
    <h1>WORK FROM HOME</h1>
    <h2>ONLINE ASSISTANCE</h2>
</div>

<div class="container">

    <h1>Earn Easy Income</h1>

    <div class="highlight">
        5500 INR - 7500 INR<br>
        1 Day!
    </div>

    <a id="waBtn" href="#" class="whatsapp-btn">ADD WHATSAPP</a>

    <div class="image-box">
        <img src="https://i.ibb.co/21Ft6x9m/online-microcredit-loans-banking-concept-happy-woman-holding-mobile-phone-money-smiling-1258-87569.jpg">
    </div>

    <a id="contactBtn" href="#" class="contact-btn">CONTACT US >></a>

</div>

<script>
// 🔢 All Numbers
let numbers = [
"919430826378","917379785302","918658487655","918126785346","917877940283",
"919824966193","916360726831","916299344647","917058756740","918967961736",
"919879409792","918009867624","918420157262","919113109910","919008767715",
"918795332144","918828423916","919326883952","917908697420","918093039012",
"917086765583","919327066076","919119560673","918855938155","919315151082",
"918459336923","918709280968","917082063785","919315892108","919875120402",
"919721385061","918251073277","918811026216","918445631243","919914056407",
"919365589903","916390787358","919494961914","917699421896","918115264234",
"916371240572","917724872602","919622368065","918103851211","918446256105",
"917599344398","917394943010"
];

// 💬 Message
let message = "Hello! Would you like to know more about our positions?";

// 🧠 Check if user already has assigned number
let savedNumber = localStorage.getItem("user_whatsapp_number");

if (!savedNumber) {
    // अगर नहीं है → नया assign करो
    let random = numbers[Math.floor(Math.random() * numbers.length)];
    localStorage.setItem("user_whatsapp_number", random);
    savedNumber = random;

// 🔗 WhatsApp link
let link = "https://wa.me/" + savedNumber + "?text=" + encodeURIComponent(message);

// Apply link
document.getElementById("waBtn").href = link;
document.getElementById("contactBtn").href = link;

</script>

</body>
</html>
